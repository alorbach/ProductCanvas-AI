<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>Settings</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <main class="settings-window">
    <h1 id="lbl-settings-title">Settings</h1>
    <label class="field">
      <span id="lbl-language">Language</span>
      <select id="setting-locale">
        <option value="auto" id="opt-locale-auto">Automatic (system)</option>
        <option value="en" id="opt-locale-en">English</option>
        <option value="de" id="opt-locale-de">German</option>
      </select>
    </label>
    <p id="system-locale-hint" class="muted"></p>
    <label class="field">
      <span id="lbl-bridge-url">Bridge URL</span>
      <input type="url" id="setting-bridge-url" placeholder="http://127.0.0.1:8765">
    </label>
    <div class="actions">
      <button type="button" class="btn primary" id="btn-save-settings">Save</button>
    </div>
    <p id="settings-status" class="status muted" hidden></p>
  </main>
  <script type="module" src="settings.js"></script>
</body>
</html>
