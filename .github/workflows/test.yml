name: Test ProductCanvas AI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        shell: pwsh
        run: ./scripts/ci-syntax-check.ps1

      - name: Run tests
        run: npm test
