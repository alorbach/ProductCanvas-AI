name: Release Windows ProductCanvas AI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  models: read

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: vars
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $buildNumber = $env:GITHUB_RUN_NUMBER
          $installerName = "ProductCanvas-AI-$version-build.$buildNumber-win-x64.exe"
          $zipName = "ProductCanvas-AI-$version-build.$buildNumber-win-x64.zip"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "build_number=$buildNumber" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_name=$installerName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_path=dist/$installerName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "zip_path=dist/$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        shell: pwsh
        run: npm version "${{ steps.vars.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Generate icons
        run: npm run icons

      - name: Check JavaScript syntax
        shell: pwsh
        run: ./scripts/ci-syntax-check.ps1

      - name: Run tests
        run: npm test

      - name: Collect release context
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: node scripts/collect-release-context.js

      - name: Generate GitHub changelog
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const tagName = context.ref.replace('refs/tags/', '');
            const notes = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              target_commitish: context.sha,
            });
            const body = String(notes.data.body || '').trim()
              || 'No generated changelog entries were returned for this tag.';
            fs.mkdirSync('dist', { recursive: true });
            fs.writeFileSync(path.join('dist', 'github-notes.md'), body);

      - name: Prepare AI inference input
        id: prep_ai
        shell: pwsh
        run: |
          node scripts/prepare-ai-inference-input.js
          $input = Get-Content -Raw dist/ai-inference-input.yaml
          $delimiter = "EOF_AI_INPUT_$([guid]::NewGuid().ToString('N'))"
          @"
          input<<$delimiter
          $input
          $delimiter
          "@ | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Generate AI release notes
        id: ai_notes
        continue-on-error: true
        uses: actions/ai-inference@v1
        with:
          prompt-file: ./.github/prompts/release-notes.prompt.yml
          input: ${{ steps.prep_ai.outputs.input }}

      - name: Save AI release notes
        if: steps.ai_notes.conclusion == 'success'
        continue-on-error: true
        shell: pwsh
        run: |
          $src = "${{ steps.ai_notes.outputs.response-file }}"
          if ($src -and (Test-Path $src)) {
            Copy-Item -Path $src -Destination dist/ai-release.json -Force
            exit 0
          }
          $response = "${{ steps.ai_notes.outputs.response }}"
          if ($response) {
            Set-Content -Path dist/ai-release.json -Value $response -Encoding utf8NoBOM
            exit 0
          }
          Write-Host "AI inference returned no response payload; assemble step will use GitHub changelog fallback."

      - name: Assemble release description
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ steps.vars.outputs.version }}
          RELEASE_BUILD_NUMBER: ${{ steps.vars.outputs.build_number }}
          RELEASE_INSTALLER_NAME: ${{ steps.vars.outputs.installer_name }}
          RELEASE_ZIP_NAME: ${{ steps.vars.outputs.zip_name }}
        run: node scripts/assemble-release-notes.js

      - name: Build Windows installer and portable ZIP
        run: npm run dist:win

      - name: Remove previous build assets for this tag
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $releaseJson = gh release view $tag --repo $repo --json assets 2>$null
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($releaseJson)) {
            Write-Host "No existing release assets to remove for $tag."
            exit 0
          }
          $release = $releaseJson | ConvertFrom-Json
          foreach ($asset in $release.assets) {
            if ($asset.name -match '^ProductCanvas-AI-.+-win-x64\.(exe|zip)$') {
              Write-Host "Removing old release asset $($asset.name)"
              gh release delete-asset $tag $asset.name --repo $repo --yes
            }
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: dist/release-notes.md
          fail_on_unmatched_files: true
          files: |
            ${{ steps.vars.outputs.installer_path }}
            ${{ steps.vars.outputs.zip_path }}
