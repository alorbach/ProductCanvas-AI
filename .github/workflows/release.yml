name: Release Windows WerbungMaker

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version
        id: vars
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $buildNumber = $env:GITHUB_RUN_NUMBER
          $installerName = "WerbungMaker-$version-build.$buildNumber-win-x64.exe"
          $zipName = "WerbungMaker-$version-build.$buildNumber-win-x64.zip"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "build_number=$buildNumber" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_name=$installerName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_path=dist/$installerName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "zip_path=dist/$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        shell: pwsh
        run: npm version "${{ steps.vars.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Generate icons
        run: npm run icons

      - name: Run tests
        run: npm test

      - name: Build Windows installer and portable ZIP
        run: npm run dist:win

      - name: Generate release description
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.vars.outputs.version }}
          RELEASE_BUILD_NUMBER: ${{ steps.vars.outputs.build_number }}
          RELEASE_INSTALLER_NAME: ${{ steps.vars.outputs.installer_name }}
          RELEASE_ZIP_NAME: ${{ steps.vars.outputs.zip_name }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const tagName = context.ref.replace('refs/tags/', '');
            const version = process.env.RELEASE_VERSION || tagName.replace(/^v/, '');
            const buildNumber = process.env.RELEASE_BUILD_NUMBER || '1';
            const installerName = process.env.RELEASE_INSTALLER_NAME;
            const zipName = process.env.RELEASE_ZIP_NAME;
            const notes = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              target_commitish: context.sha,
            });
            const body = [
              `# WerbungMaker ${tagName}`,
              '',
              'TELE-KOHLGRAF Werbebild-Generator für Windows.',
              '',
              '## Downloads',
              '',
              `- Installer: \`${installerName}\``,
              `- Portable ZIP: \`${zipName}\``,
              '',
              '## Changelog',
              '',
              String(notes.data.body || '').trim() || 'Keine Einträge.',
              '',
            ].join('\n');
            fs.mkdirSync('dist', { recursive: true });
            fs.writeFileSync(path.join('dist', 'release-notes.md'), body);

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: dist/release-notes.md
          fail_on_unmatched_files: true
          files: |
            ${{ steps.vars.outputs.installer_path }}
            ${{ steps.vars.outputs.zip_path }}
